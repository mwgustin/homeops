apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: sheet-id
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-secret-store
    kind: ClusterSecretStore
  target:
    name: sheet-id
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: sheet-id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: activity-rando-sheet-id
        metadataPolicy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: discord-server-id
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-secret-store
    kind: ClusterSecretStore
  target:
    name: discord-server-id
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: discord-server-id
      remoteRef:
        conversionStrategy: Default
        decodingStrategy: None
        key: activity-rando-discord-server-id
        metadataPolicy: None
