apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: uss-champlin-web
  namespace: default
  annotations:
    gethomepage.dev/description: USS Champlin website
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Hosting
    gethomepage.dev/icon: mdi-anchor
    gethomepage.dev/name: USS Champlin
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: external
      namespace: envoy-gateway
  hostnames:
    - usschamplin.com
    - usschamp.internal.gustend.net
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: uss-champlin-web
          port: 80
          weight: 1
