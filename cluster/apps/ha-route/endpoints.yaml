endpoints:
  - addresses:
      - "10.1.15.115"
    conditions:
      ready: true
ports:
  - name: http
    protocol: TCP
    port: 4357
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ha-observer-service
  namespace: media
subsets:
  - addresses:
      - ip: 10.1.15.115
