apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: ha-service
  namespace: media
  labels:
    kubernetes.io/service-name: ha-service
addressType: IPv4
endpoints:
  - addresses:
      - "10.1.15.115"
    conditions:
      ready: true
ports:
  - name: http
    protocol: TCP
    port: 8123
---
apiVersion: v1
kind: Endpoints
metadata:
  name: ha-service
  namespace: media
subsets:
  - addresses:
      - ip: 10.1.15.115
    ports:
      - name: http
        port: 8123
        protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
