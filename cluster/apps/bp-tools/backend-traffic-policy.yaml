apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: bp-tools-websocket
  namespace: default
  labels:
    app.kubernetes.io/name: bp-tools
spec:
  targetRef:
    group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: bp-tools
  loadBalancer:
    type: ConsistentHash
    consistentHash:
      type: Cookie
      cookie:
        name: bp-tools-session
        ttl: 24h
        attributes:
          Path: /
          Secure: ""
          SameSite: Lax
  timeout:
    http:
      maxStreamDuration: 0s
  httpUpgrade:
    - type: websocket