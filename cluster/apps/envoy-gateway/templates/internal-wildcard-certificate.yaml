apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-wildcard-gustend-net
  namespace: envoy-gateway
spec:
  secretName: internal-wildcard-gustend-net-cert
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-prod
  commonName: "*.internal.gustend.net"
  dnsNames:
    - "*.internal.gustend.net"
    - internal.gustend.net