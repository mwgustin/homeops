apiVersion: v1
kind: Service
metadata:
  annotations:
    kompose.cmd: kompose convert
    kompose.version: 1.32.0 (HEAD)
  labels:
    io.kompose.service: ghost
  name: ghost
spec:
  ports:
    - name: "80"
      port: 80
      targetPort: 2368
  selector:
    io.kompose.service: ghost
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: httpbin-ingress
spec:
  ingressClassName: external
  rules:
    - host: blog.gustend.net
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ghost
                port:
                  # name: http
                  number: 80